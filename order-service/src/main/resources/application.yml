spring:
  application:
    name: order-service

  datasource:
    url: jdbc:postgresql://postgres:5432/ordersdb
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080